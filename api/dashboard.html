<!DOCTYPE html>
<html>
<head>
    <title>RF Analyzer V2 - Security Dashboard</title>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e0e0e0; padding: 20px; }
        h1 { color: #ff6b6b; margin-bottom: 20px; }
        .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat { background: #161b22; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #30363d; }
        .stat-value { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 11px; color: #8b949e; margin-top: 5px; text-transform: uppercase; }
        .stat-ok { color: #7ee787; }
        .stat-warn { color: #f0883e; }
        .stat-crit { color: #f85149; }
        .section { background: #161b22; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .section h2 { color: #ff6b6b; margin-bottom: 15px; font-size: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid #30363d; font-size: 12px; }
        th { color: #8b949e; font-size: 10px; text-transform: uppercase; }
        tr:hover { background: #21262d; }
        .vendor { color: #58a6ff; }
        .type { color: #7ee787; }
        .risk-low { color: #7ee787; }
        .risk-med { color: #f0883e; }
        .risk-high { color: #f85149; }
        .risk-crit { color: #ff7b72; font-weight: bold; }
        .vuln { display: inline-block; background: #f8514933; color: #f85149; padding: 2px 6px; border-radius: 3px; font-size: 10px; margin: 2px; }
        .refresh { background: #ff6b6b; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        .actions { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🔬 RF Analyzer V2 - Security Dashboard</h1>
    <div class="actions">
        <button class="refresh" onclick="loadData()">🔄 Refresh</button>
    </div>
    
    <div class="stats">
        <div class="stat"><div class="stat-value" id="devices">-</div><div class="stat-label">Devices</div></div>
        <div class="stat"><div class="stat-value stat-crit" id="critical">-</div><div class="stat-label">Critical</div></div>
        <div class="stat"><div class="stat-value stat-warn" id="high">-</div><div class="stat-label">High Risk</div></div>
        <div class="stat"><div class="stat-value" id="medium">-</div><div class="stat-label">Medium</div></div>
        <div class="stat"><div class="stat-value stat-ok" id="low">-</div><div class="stat-label">Low Risk</div></div>
        <div class="stat"><div class="stat-value" id="vulns">-</div><div class="stat-label">Vulns Found</div></div>
    </div>
    
    <div class="section">
        <h2>⚠️ Devices by Risk Level</h2>
        <table>
            <thead>
                <tr>
                    <th>IP</th><th>MAC</th><th>Fabricante</th><th>Tipo</th><th>Risk</th>
                    <th>Vulnerabilities</th><th>Last Seen</th>
                </tr>
            </thead>
            <tbody id="devices-table"></tbody>
        </table>
    </div>

    <script>
        const API = 'http://127.0.0.1:8891';
        
        function getRiskClass(score) {
            if (score >= 80) return 'risk-crit';
            if (score >= 60) return 'risk-high';
            if (score >= 40) return 'risk-med';
            return 'risk-low';
        }
        
        async function loadData() {
            try {
                const devicesRes = await fetch(API + '/api/v2/devices?limit=100');
                const data = await devicesRes.json();
                const devs = data.devices || [];
                
                // Stats
                let critical = 0, high = 0, medium = 0, low = 0, vulnCount = 0;
                
                devs.forEach(d => {
                    const r = d.risk_score || 0;
                    if (r >= 80) critical++;
                    else if (r >= 60) high++;
                    else if (r >= 40) medium++;
                    else low++;
                    if (d.vulnerabilities && d.vulnerabilities.length) vulnCount += d.vulnerabilities.length;
                });
                
                document.getElementById('devices').textContent = devs.length;
                document.getElementById('critical').textContent = critical;
                document.getElementById('high').textContent = high;
                document.getElementById('medium').textContent = medium;
                document.getElementById('low').textContent = low;
                document.getElementById('vulns').textContent = vulnCount;
                
                // Table - sort by risk
                devs.sort((a, b) => (b.risk_score || 0) - (a.risk_score || 0));
                
                document.getElementById('devices-table').innerHTML = devs.map(d => {
                    const r = d.risk_score || 0;
                    const riskClass = getRiskClass(r);
                    const vulns = d.vulnerabilities || [];
                    const vulnHtml = vulns.map(v => 
                        `<span class="vuln">${v.service || v.port} (${v.risk || 'high'})</span>`
                    ).join('');
                    const lastSeen = d.last_seen ? d.last_seen.substring(0, 19) : 'N/A';
                    
                    return `<tr>
                        <td>${d.ip}</td>
                        <td>${d.mac || 'N/A'}</td>
                        <td class="vendor">${d.vendor || 'Unknown'}</td>
                        <td class="type">${d.device_type || 'Unknown'}</td>
                        <td class="${riskClass}">${r}</td>
                        <td>${vulnHtml || '-'}</td>
                        <td>${lastSeen}</td>
                    </tr>`;
                }).join('') || '<tr><td colspan="7">No devices found</td></tr>';
                
            } catch(e) { console.error(e); }
        }
        
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
