version: '3.8'

services:
  # Core Infrastructure
  mongodb:
    image: mongo:7
    container_name: rf2-mongodb
    ports:
      - "27228:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: rf_analyzer_v2
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rf2-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # API & Backend
  api:
    build: ./api
    container_name: rf2-api
    ports:
      - "8891:8890"
    environment:
      - MONGODB_URL=mongodb://127.0.0.1:27228
      - REDIS_URL=redis://127.0.0.1:6379
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  # Dashboard with Grafana
  dashboard:
    build: ./dashboard
    container_name: rf2-dashboard
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - mongodb
    restart: unless-stopped

  # RF Capture
  rf-capture:
    build: ./rf-capture
    container_name: rf2-rf-capture
    privileged: true
    volumes:
      - ./captures:/app/captures
    environment:
      - MONGODB_URL=mongodb://127.0.0.1:27228
    restart: unless-stopped

  # Network Sniffer with ML
  sniffer:
    build: ./sniffer
    container_name: rf2-sniffer
    privileged: true
    network_mode: host
    volumes:
      - ./captures:/app/captures
    environment:
      - MONGODB_URL=mongodb://127.0.0.1:27228
      - ML_ENABLED=true
    restart: unless-stopped

  # ML Classification Engine
  ml-engine:
    build: ./ml
    container_name: rf2-ml-engine
    environment:
      - MONGODB_URL=mongodb://127.0.0.1:27228
      - REDIS_URL=redis://127.0.0.1:6379
    volumes:
      - ./ml/models:/app/models
    restart: unless-stopped

  # Alert Manager
  alerts:
    build: ./alerts
    container_name: rf2-alerts
    environment:
      - MONGODB_URL=mongodb://127.0.0.1:27228
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    restart: unless-stopped

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: rf2-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

volumes:
  mongodb_data:
  grafana_data:
  prometheus_data:
